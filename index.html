<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>현대힘스 포항공장부 MSDS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", Arial, sans-serif;
      background: #f4f7f9;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #0f3d75, #14532d);
      color: white;
      padding: 26px 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      font-size: 15px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-top: 5px solid #0f766e;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: #475569;
      font-size: 14px;
    }

    .section {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section h2 {
      margin: 0 0 8px 0;
      font-size: 24px;
    }

    .count {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .search-box {
      background: #ffffff;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 6px solid #0f766e;
    }

    .search-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 15px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15,118,110,0.15);
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      background: #0f766e;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 8px;
    }

    .back-btn:hover {
      background: #115e59;
    }

    .file-list a {
      display: block;
      text-decoration: none;
      color: #111827;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-weight: 600;
      transition: background 0.15s ease, border-color 0.15s ease;
      word-break: break-word;
    }

    .file-list a:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }

    .empty {
      display: none;
      padding: 16px;
      margin-top: 16px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 10px;
      color: #9a3412;
      text-align: center;
      font-weight: 600;
    }

    .loading {
      color: #475569;
      padding: 8px 0 14px;
      font-size: 14px;
      text-align: center;
    }

    .breadcrumb {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .result-tag {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 8px;
      font-size: 12px;
      border-radius: 999px;
      background: #e5f3ff;
      color: #0f3d75;
      border: 1px solid #bfdbfe;
    }

    .footer {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      padding: 24px 16px 10px;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 22px;
      }

      .section h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>현대힘스 포항공장부 MSDS</h1>
    <p>원하는 MSDS를 검색하여 확인하세요</p>
  </div>

  <div class="wrap">
    <!-- 홈 -->
    <div id="homeView">
      <div class="card-grid">
        <div class="card" onclick="openMain('paint')">
          <h3>도료 MSDS</h3>
          <p>제조사별 도료 MSDS</p>
        </div>

        <div class="card" onclick="openMain('welding')">
          <h3>용접재 MSDS</h3>
          <p>용접재 / 용접보조재 / 가우징봉</p>
        </div>

        <div class="card" onclick="openMain('etc')">
          <h3>그외 MSDS</h3>
          <p>기타 MSDS</p>
        </div>
      </div>
    </div>

    <!-- 서브 메뉴 -->
    <div id="subMenuSection" class="section">
      <button class="back-btn" onclick="goHome()">← 홈으로</button>

      <div class="search-box">
        <label for="subMenuSearch" id="subMenuSearchLabel">🔎 폴더 검색</label>
        <input type="text" id="subMenuSearch" placeholder="폴더명 검색">
      </div>

      <div class="search-box">
        <label for="globalFileSearch" id="globalFileSearchLabel">🔎 전체 파일 검색</label>
        <input type="text" id="globalFileSearch" placeholder="제품명 또는 파일명 검색">
      </div>

      <h2 id="subMenuTitle">목록</h2>
      <div class="count" id="subMenuCount"></div>
      <div class="card-grid" id="subMenuGrid"></div>
      <div class="empty" id="subMenuEmpty">폴더 검색 결과가 없습니다.</div>

      <h2 style="margin-top:28px;">통합 검색 결과</h2>
      <div class="count" id="globalFileCount"></div>
      <div class="file-list" id="globalFileList"></div>
      <div class="empty" id="globalFileEmpty">파일 검색 결과가 없습니다.</div>
    </div>

    <!-- 파일 목록 -->
    <div id="fileSection" class="section">
      <button class="back-btn" onclick="goBackToSubMenu()">← 이전</button>

      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="search-box">
        <label for="fileSearch" id="searchLabel">🔎 MSDS 검색</label>
        <input type="text" id="fileSearch" placeholder="파일명 검색">
      </div>

      <h2 id="fileTitle">MSDS 목록</h2>
      <div class="count" id="fileCount"></div>
      <div class="file-list" id="fileList"></div>
      <div class="empty" id="fileEmpty">검색 결과가 없습니다.</div>
    </div>

    <div id="loadingMsg" class="loading">파일 목록 불러오는 중...</div>

    <div class="footer">HYUNDAI-HIMS Pohang Plant MSDS</div>
  </div>

  <script>
    const OWNER = "sjchoi5007-alt";
    const REPO = "-MSDS";

    let currentMain = "";
    let currentFiles = [];
    let currentDirs = [];
    let currentRecursiveFiles = [];

    const titleMap = {
      paint: "도료 MSDS",
      welding: "용접재 MSDS",
      etc: "그외 MSDS"
    };

    function apiUrl(path) {
      return `https://api.github.com/repos/${OWNER}/${encodeURIComponent(REPO)}/contents/${path}`;
    }

    function treeUrl() {
      return `https://api.github.com/repos/${OWNER}/${encodeURIComponent(REPO)}/git/trees/main?recursive=1`;
    }

    function displayName(filename) {
      return filename.replace(/\.pdf$/i, "");
    }

    function sortByName(arr) {
      return arr.sort((a, b) => a.name.localeCompare(b.name, "ko"));
    }

    async function fetchFolder(path) {
      const res = await fetch(apiUrl(path));
      if (!res.ok) throw new Error(path + " 불러오기 실패");
      return await res.json();
    }

    async function fetchRecursiveFiles(baseFolder) {
      const res = await fetch(treeUrl());
      if (!res.ok) throw new Error("전체 파일 목록 불러오기 실패");
      const data = await res.json();

      return data.tree
        .filter(item =>
          item.type === "blob" &&
          item.path.startsWith(baseFolder + "/") &&
          item.path.toLowerCase().endsWith(".pdf")
        )
        .map(item => {
          const parts = item.path.split("/");
          const folderName = parts.length >= 3 ? parts[1] : baseFolder;
          return {
            name: parts[parts.length - 1],
            folder: folderName,
            path: item.path,
            url: `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${encodeURIComponent(item.path).replace(/%2F/g, "/")}`
          };
        })
        .sort((a, b) => a.name.localeCompare(b.name, "ko"));
    }

    function setLoading(show, message = "파일 목록 불러오는 중...") {
      const el = document.getElementById("loadingMsg");
      el.textContent = message;
      el.style.display = show ? "block" : "none";
    }

    function goHome() {
      document.getElementById("homeView").style.display = "block";
      document.getElementById("subMenuSection").style.display = "none";
      document.getElementById("fileSection").style.display = "none";

      document.getElementById("subMenuSearch").value = "";
      document.getElementById("globalFileSearch").value = "";
      document.getElementById("fileSearch").value = "";

      currentMain = "";
      currentFiles = [];
      currentDirs = [];
      currentRecursiveFiles = [];
    }

    function goBackToSubMenu() {
      document.getElementById("fileSection").style.display = "none";
      document.getElementById("subMenuSection").style.display = "block";
      document.getElementById("fileSearch").value = "";
    }

    function renderSubMenu(keyword) {
      const grid = document.getElementById("subMenuGrid");
      const empty = document.getElementById("subMenuEmpty");
      const count = document.getElementById("subMenuCount");

      grid.innerHTML = "";

      const filtered = currentDirs.filter(dir =>
        dir.name.toLowerCase().includes(keyword.toLowerCase())
      );

      filtered.forEach(dir => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h3>${dir.name}</h3><p>폴더 열기</p>`;
        div.onclick = () => openSubFolder(`${currentMain}/${dir.name}`, dir.name);
        grid.appendChild(div);
      });

      count.textContent = `총 ${filtered.length}건`;
      empty.style.display = filtered.length === 0 ? "block" : "none";
    }

    function renderGlobalFiles(keyword) {
      const list = document.getElementById("globalFileList");
      const count = document.getElementById("globalFileCount");
      const empty = document.getElementById("globalFileEmpty");

      list.innerHTML = "";

      const filtered = currentRecursiveFiles.filter(file =>
        file.name.toLowerCase().includes(keyword.toLowerCase())
      );

      filtered.forEach(file => {
        const a = document.createElement("a");
        a.href = file.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.innerHTML = `${displayName(file.name)} <span class="result-tag">${file.folder}</span>`;
        list.appendChild(a);
      });

      count.textContent = `총 ${filtered.length}건`;
      empty.style.display = filtered.length === 0 ? "block" : "none";
    }

    async function openMain(mainFolder) {
      currentMain = mainFolder;

      document.getElementById("homeView").style.display = "none";
      document.getElementById("fileSection").style.display = "none";
      document.getElementById("subMenuSection").style.display = "block";

      document.getElementById("subMenuTitle").textContent = titleMap[mainFolder] || "목록";
      document.getElementById("subMenuSearchLabel").textContent = `🔎 ${titleMap[mainFolder]} 폴더 검색`;
      document.getElementById("globalFileSearchLabel").textContent = `🔎 ${titleMap[mainFolder]} 전체 파일 검색`;

      document.getElementById("subMenuSearch").value = "";
      document.getElementById("globalFileSearch").value = "";

      document.getElementById("subMenuGrid").innerHTML = "";
      document.getElementById("globalFileList").innerHTML = "";

      setLoading(true);

      try {
        const [folderData, recursiveFiles] = await Promise.all([
          fetchFolder(mainFolder),
          fetchRecursiveFiles(mainFolder)
        ]);

        const dirs = sortByName(folderData.filter(item => item.type === "dir"));
        const pdfs = sortByName(folderData.filter(item => item.type === "file" && /\.pdf$/i.test(item.name)));

        currentDirs = dirs;
        currentRecursiveFiles = recursiveFiles;

        renderSubMenu("");
        renderGlobalFiles("");

        if (dirs.length === 0 && pdfs.length > 0) {
          openFileList(mainFolder, titleMap[mainFolder] || mainFolder);
        }

        if (dirs.length === 0 && pdfs.length === 0 && recursiveFiles.length === 0) {
          document.getElementById("subMenuGrid").innerHTML =
            `<div class="empty" style="display:block;">표시할 폴더나 PDF가 없습니다.</div>`;
        }
      } catch (e) {
        document.getElementById("subMenuGrid").innerHTML =
          `<div class="empty" style="display:block;">폴더를 불러오지 못했습니다.</div>`;
      } finally {
        setLoading(false);
      }
    }

    function openSubFolder(path, title) {
      openFileList(path, title);
    }

    async function openFileList(path, title) {
      document.getElementById("subMenuSection").style.display = "none";
      document.getElementById("fileSection").style.display = "block";
      document.getElementById("fileTitle").textContent = title;
      document.getElementById("fileSearch").value = "";
      document.getElementById("searchLabel").textContent = `🔎 ${title} 검색`;
      document.getElementById("breadcrumb").textContent = `${titleMap[currentMain]} > ${title}`;

      setLoading(true);

      try {
        const data = await fetchFolder(path);
        currentFiles = sortByName(
          data
            .filter(item => item.type === "file" && /\.pdf$/i.test(item.name))
            .map(item => ({
              name: item.name,
              download_url: item.download_url
            }))
        );
        renderFiles("");
      } catch (e) {
        currentFiles = [];
        renderFiles("");
      } finally {
        setLoading(false);
      }
    }

    function renderFiles(keyword) {
      const list = document.getElementById("fileList");
      const count = document.getElementById("fileCount");
      const empty = document.getElementById("fileEmpty");

      list.innerHTML = "";

      const filtered = currentFiles.filter(file =>
        file.name.toLowerCase().includes(keyword.toLowerCase())
      );

      filtered.forEach(file => {
        const a = document.createElement("a");
        a.href = file.download_url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = displayName(file.name);
        list.appendChild(a);
      });

      count.textContent = `총 ${filtered.length}건`;
      empty.style.display = filtered.length === 0 ? "block" : "none";
    }

    document.getElementById("subMenuSearch").addEventListener("input", function () {
      renderSubMenu(this.value);
    });

    document.getElementById("globalFileSearch").addEventListener("input", function () {
      renderGlobalFiles(this.value);
    });

    document.getElementById("fileSearch").addEventListener("input", function () {
      renderFiles(this.value);
    });

    setLoading(false);
  </script>
</body>
</html>
