<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>현대힘스 포항공장부 MSDS</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", Arial, sans-serif;
      background: #f4f7f9;
      color: #1f2937;
    }

    .header {
      background: linear-gradient(135deg, #0f3d75, #14532d);
      color: white;
      padding: 26px 16px;
      text-align: center;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      font-size: 15px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .search-box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 6px solid #0f766e;
    }

    .search-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 15px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15,118,110,0.15);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-top: 5px solid #0f766e;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: #475569;
      font-size: 14px;
    }

    .section {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .count {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      background: #0f766e;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .back-btn:hover {
      background: #115e59;
    }

    .file-list a {
      display: block;
      text-decoration: none;
      color: #111827;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-weight: 600;
      transition: background 0.15s ease, border-color 0.15s ease;
      word-break: break-word;
    }

    .file-list a:hover {
      background: #eef6ff;
      border-color: #93c5fd;
    }

    .empty {
      display: none;
      padding: 16px;
      margin-top: 16px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      border-radius: 10px;
      color: #9a3412;
      text-align: center;
      font-weight: 600;
    }

    .loading {
      color: #475569;
      padding: 8px 0 14px;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      padding: 24px 16px 10px;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 22px;
      }

      .section h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>현대힘스 포항공장부 MSDS</h1>
    <p>원하는 MSDS를 검색하여 확인하세요</p>
  </div>

  <div class="wrap">
    <div class="search-box">
      <label for="searchInput">🔎 MSDS 검색 (한글 + 영문)</label>
      <input type="text" id="searchInput" placeholder="예: A-3, THINNER, KCC, HEMPEL, JOTUN">
    </div>

    <div id="mainMenu">
      <div class="category-grid">
        <div class="card" onclick="showSection('paint')">
          <h3>도료 MSDS</h3>
          <p>도장 관련 MSDS 목록</p>
        </div>

        <div class="card" onclick="showSection('welding')">
          <h3>용접재 MSDS</h3>
          <p>용접재 관련 MSDS 목록</p>
        </div>

        <div class="card" onclick="showSection('etc')">
          <h3>그외 MSDS</h3>
          <p>기타 MSDS 목록</p>
        </div>
      </div>
    </div>

    <div id="paint" class="section">
      <button class="back-btn" onclick="goHome()">← 목록으로</button>
      <h2>도료 MSDS</h2>
      <div class="count" id="paintCount"></div>
      <div class="file-list" id="paintList"></div>
    </div>

    <div id="welding" class="section">
      <button class="back-btn" onclick="goHome()">← 목록으로</button>
      <h2>용접재 MSDS</h2>
      <div class="count" id="weldingCount"></div>
      <div class="file-list" id="weldingList"></div>
    </div>

    <div id="etc" class="section">
      <button class="back-btn" onclick="goHome()">← 목록으로</button>
      <h2>그외 MSDS</h2>
      <div class="count" id="etcCount"></div>
      <div class="file-list" id="etcList"></div>
    </div>

    <div id="emptyMsg" class="empty">검색 결과가 없습니다.</div>
    <div id="loadingMsg" class="loading">파일 목록 불러오는 중...</div>

    <div class="footer">HYUNDAI-HIMS Pohang Plant MSDS</div>
  </div>

  <script>
    const OWNER = "sjchoi5007-alt";
    const REPO = "-MSDS";

    const sections = ["paint", "welding", "etc"];
    const labels = {
      paint: "도료 MSDS",
      welding: "용접재 MSDS",
      etc: "그외 MSDS"
    };

    const searchInput = document.getElementById("searchInput");
    const mainMenu = document.getElementById("mainMenu");
    const emptyMsg = document.getElementById("emptyMsg");
    const loadingMsg = document.getElementById("loadingMsg");

    const state = {
      paint: [],
      welding: [],
      etc: []
    };

    function apiUrl(folder) {
      return `https://api.github.com/repos/${OWNER}/${encodeURIComponent(REPO)}/contents/${folder}`;
    }

    function displayName(filename) {
      return filename.replace(/\.pdf$/i, "");
    }

    function sortKo(arr) {
      return arr.sort((a, b) => a.name.localeCompare(b.name, "ko"));
    }

    function buildLink(file, folder) {
      const a = document.createElement("a");
      a.href = file.download_url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.dataset.name = file.name.toLowerCase();
      a.dataset.folder = folder;
      a.textContent = displayName(file.name);
      return a;
    }

    function renderFolder(folder, files) {
      const list = document.getElementById(folder + "List");
      const count = document.getElementById(folder + "Count");

      list.innerHTML = "";

      const pdfs = files
        .filter(file => file.type === "file" && /\.pdf$/i.test(file.name))
        .map(file => ({
          name: file.name,
          download_url: file.download_url
        }));

      sortKo(pdfs);
      state[folder] = pdfs;

      pdfs.forEach(file => {
        list.appendChild(buildLink(file, folder));
      });

      count.textContent = `총 ${pdfs.length}건`;
    }

    async function loadFolder(folder) {
      const response = await fetch(apiUrl(folder));
      if (!response.ok) {
        throw new Error(folder + " 폴더를 불러오지 못했습니다.");
      }
      const data = await response.json();
      renderFolder(folder, data);
    }

    async function loadAllFolders() {
      try {
        await Promise.all([
          loadFolder("paint"),
          loadFolder("welding"),
          loadFolder("etc")
        ]);
        loadingMsg.style.display = "none";
      } catch (error) {
        loadingMsg.textContent = "파일 목록을 불러오지 못했습니다. 폴더명/저장소명을 확인하세요.";
        console.error(error);
      }
    }

    function showSection(id) {
      mainMenu.style.display = "none";
      sections.forEach(sectionId => {
        document.getElementById(sectionId).style.display = (sectionId === id) ? "block" : "none";
      });
      runSearch();
    }

    function goHome() {
      sections.forEach(sectionId => {
        document.getElementById(sectionId).style.display = "none";
      });
      mainMenu.style.display = "block";
      emptyMsg.style.display = "none";
      searchInput.value = "";
      refreshVisibleLists("");
    }

    function refreshVisibleLists(query) {
      let totalVisible = 0;

      sections.forEach(folder => {
        const list = document.getElementById(folder + "List");
        const count = document.getElementById(folder + "Count");
        list.innerHTML = "";

        const filtered = state[folder].filter(file =>
          file.name.toLowerCase().includes(query)
        );

        filtered.forEach(file => {
          list.appendChild(buildLink(file, folder));
        });

        count.textContent = `총 ${filtered.length}건`;
        totalVisible += filtered.length;

        if (mainMenu.style.display === "none") {
          document.getElementById(folder).style.display = filtered.length > 0 ? "block" : "none";
        }
      });

      if (mainMenu.style.display === "none") {
        emptyMsg.style.display = totalVisible === 0 ? "block" : "none";
      } else {
        emptyMsg.style.display = "none";
      }
    }

    function runSearch() {
      const q = searchInput.value.trim().toLowerCase();
      refreshVisibleLists(q);
    }

    searchInput.addEventListener("input", function () {
      const q = searchInput.value.trim();

      if (q !== "") {
        mainMenu.style.display = "none";
        sections.forEach(sectionId => {
          document.getElementById(sectionId).style.display = "block";
        });
      } else {
        goHome();
        return;
      }

      runSearch();
    });

    loadAllFolders();
  </script>
</body>
</html>
