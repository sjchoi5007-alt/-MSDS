<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>현대힘스 포항공장부 MSDS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7f9;
}

.header{
background:#0f3d75;
color:white;
text-align:center;
padding:25px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card:hover{
background:#eef6ff;
}

.search{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.file-list a{
display:block;
padding:10px;
margin-bottom:8px;
background:#f8fafc;
border-radius:6px;
text-decoration:none;
color:#000;
}

.file-list a:hover{
background:#e3f2fd;
}

.back{
margin-bottom:15px;
background:#0f766e;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>현대힘스 포항공장부 MSDS</h1>
<p>원하는 MSDS를 검색하여 확인하세요</p>
</div>

<div class="container">

<div id="home">

<div class="card" onclick="openMenu('paint')">
<h3>도료 MSDS</h3>
</div>

<div class="card" onclick="openMenu('welding')">
<h3>용접재 MSDS</h3>
</div>

<div class="card" onclick="openMenu('etc')">
<h3>그외 MSDS</h3>
</div>

</div>


<div id="menu" style="display:none">

<button class="back" onclick="goHome()">← 목록</button>

<div class="search">
<input type="text" id="searchInput" placeholder="MSDS 검색">
</div>

<div id="subMenu"></div>

<div class="file-list" id="fileList"></div>

</div>

</div>

<script>

const owner="sjchoi5007-alt"
const repo="-MSDS"

let currentPath=""

function goHome(){

document.getElementById("menu").style.display="none"
document.getElementById("home").style.display="block"

}

function openMenu(folder){

document.getElementById("home").style.display="none"
document.getElementById("menu").style.display="block"

currentPath=folder

loadFolder(folder)

}

async function loadFolder(path){

const url=`https://api.github.com/repos/${owner}/${repo}/contents/${path}`

const res=await fetch(url)
const data=await res.json()

const subMenu=document.getElementById("subMenu")
const fileList=document.getElementById("fileList")

subMenu.innerHTML=""
fileList.innerHTML=""

data.forEach(item=>{

if(item.type==="dir"){

const div=document.createElement("div")

div.className="card"
div.innerText=item.name

div.onclick=()=>loadFolder(path+"/"+item.name)

subMenu.appendChild(div)

}

if(item.name.endsWith(".pdf")){

const a=document.createElement("a")

a.href=item.download_url
a.target="_blank"
a.innerText=item.name.replace(".pdf","")

fileList.appendChild(a)

}

})

}

document.getElementById("searchInput").addEventListener("input",function(){

const keyword=this.value.toLowerCase()

const items=document.querySelectorAll("#fileList a")

items.forEach(item=>{

if(item.innerText.toLowerCase().includes(keyword)){

item.style.display="block"

}else{

item.style.display="none"

}

})

})

</script>

</body>
</html>
